<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScanDocs{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .hero-gradient {
            background: radial-gradient(circle at top right, #fee2e2 0%, #ffffff 50%, #fef2f2 100%);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 text-slate-900 selection:bg-red-100 selection:text-red-700">

    <!-- Glowing Background blobs -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 opacity-30 pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-red-300 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div>
    </div>

    <div class="min-h-full flex flex-col">
        <!-- Navigation -->
        <header class="sticky top-0 z-50 glass border-b border-slate-200/50">
            <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-200">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                            </svg>
                        </div>
                        <a href="{{ url_for('home') }}" class="text-xl font-bold tracking-tight text-slate-900">Scan<span class="text-red-600">Docs</span></a>
                    </div>
                    
                    <div class="hidden md:flex items-center space-x-8">
                        <a href="{{ url_for('home') }}" class="text-sm font-medium text-slate-600 hover:text-red-600 transition-colors">Accueil</a>
                        <a href="{{ url_for('upload_page') }}" class="text-sm font-medium text-slate-600 hover:text-red-600 transition-colors">Scanner</a>
                        <a href="{{ url_for('documents') }}" class="text-sm font-medium text-slate-600 hover:text-red-600 transition-colors">Bibliothèque</a>
                        <a href="{{ url_for('companies') }}" class="text-sm font-medium text-slate-600 hover:text-red-600 transition-colors">Entreprises</a>
                    </div>

                    <div class="flex items-center gap-4">
                        <a href="{{ url_for('upload_page') }}" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-semibold rounded-xl shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all">
                            Scanner un doc
                        </a>
                    </div>
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="flex-grow">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-slate-200 mt-12 py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row justify-between items-center gap-0">
                    <p class="text-sm text-slate-500">© 2024 ScanDocs AI. Tous droits réservés.</p>
                    <div class="flex gap-6">
                        <a href="#" class="text-xs text-slate-400 hover:text-slate-600">Confidentialité</a>
                        <a href="#" class="text-xs text-slate-400 hover:text-slate-600">Conditions</a>
                        <a href="#" class="text-xs text-slate-400 hover:text-slate-600">Aide</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const style = document.createElement('style');
        style.textContent = `
            @keyframes blob {
                0% { transform: translate(0px, 0px) scale(1); }
                33% { transform: translate(30px, -50px) scale(1.1); }
                66% { transform: translate(-20px, 20px) scale(0.9); }
                100% { transform: translate(0px, 0px) scale(1); }
            }
            .animate-blob {
                animation: blob 7s infinite;
            }
            .animation-delay-2000 {
                animation-delay: 2s;
            }
        `;
        document.head.append(style);
    </script>
</body>
</html>
